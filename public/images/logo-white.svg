  </g>
  <!-- Text "Solarheld" -->
  <text x="46" y="27" font-family="'Plus Jakarta Sans', 'Inter', Arial, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">Solar<tspan fill="#FBBF24">held</tspan></text>
