    <line x1="20" y1="38" x2="20" y2="34"/>
    <line x1="6" y1="20" x2="2" y2="20"/>
    <line x1="38" y1="20" x2="34" y2="20"/>
    <line x1="10.1" y1="10.1" x2="7.3" y2="7.3"/>
    <line x1="32.7" y1="32.7" x2="29.9" y2="29.9"/>
